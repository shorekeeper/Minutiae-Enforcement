<!DOCTYPE html>
<!--
  Language redirector. Honours a stored preference first, then the browser
  language list, then falls back to English. The meta refresh serves clients
  with scripting disabled.
-->
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Minutiae Enforcement</title>
    <meta http-equiv="refresh" content="1; url=en/">
    <script>
        (function () {
            'use strict';
            var supported = ['en', 'ru', 'uk'];
            var lang = null;
            try { lang = localStorage.getItem('me-lang'); } catch (e) { /* storage denied */ }
            if (supported.indexOf(lang) < 0) {
                lang = null;
                var prefs = navigator.languages || [navigator.language || 'en'];
                for (var i = 0; i < prefs.length && !lang; i++) {
                    var code = String(prefs[i]).slice(0, 2).toLowerCase();
                    if (supported.indexOf(code) >= 0) { lang = code; }
                }
            }
            location.replace((lang || 'en') + '/');
        })();
    </script>
</head>
<body>
<p><a href="en/">English</a> · <a href="ru/">Русский</a> · <a href="uk/">Українська</a></p>
</body>
</html>
