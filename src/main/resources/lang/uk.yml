  no-session: "&#7C93A0  Сесію не записано"
  line: "&#7C93A0  {label}  &#E8EEF0{value}"
  no-match: "&#79FFB0  Збігів немає"
  match: "&#FFC061  Збіг &8· бан={banned} оцінка={score} сигналів={signals}"
  not-online: "{prefix}&#FF7A7AГравець не в мережі &8· &#E8EEF0{name}"

alam:
